services:
  # Название сервиса для базы данных
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d myapp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Название сервиса для твоего FastAPI
  web:
    build: .
    container_name: fastnotes_app
    command: >
      sh -c "alembic upgrade head; 
             python -m app.initial_data; 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
